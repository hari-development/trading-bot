name: Deploy Flutter Web Dashboard to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install Flutter dependencies
        run: |
          cd frontend
          flutter pub get

      - name: 🛠️ Build Flutter Web App
        run: |
          cd frontend
          flutter build web --release --base-href "/trading-bot/"

      - name: 🚀 Deploy to GitHub Pages
        uses: PeaceIris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build/web
